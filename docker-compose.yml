version: "3.8"

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    volumes:
      # Configuracion persistente de OpenClaw
      - openclaw-data:/data/.openclaw
      # Workspace del agente (archivos que el agente puede ver/crear)
      - openclaw-workspace:/data/workspace
      # === CARPETAS DE TU PC (solo las que tu elijas) ===
      # Descomenta y ajusta las rutas a las carpetas que quieras compartir.
      # Formato: /ruta/en/tu/pc:/ruta/en/contenedor:ro (solo lectura) o :rw (lectura y escritura)
      #
      # Ejemplo Windows:
      # - C:/Users/TuUsuario/Documents/proyectos:/data/proyectos:rw
      # - C:/Users/TuUsuario/Desktop/datos:/data/datos:ro
      #
      # Ejemplo Linux/Mac:
      # - /home/tuusuario/proyectos:/data/proyectos:rw
    env_file:
      - .env.openclaw
    environment:
      # Dirs internos del contenedor
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspace
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18790/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  openclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-cli
    profiles:
      - cli
    volumes:
      - openclaw-data:/data/.openclaw
      - openclaw-workspace:/data/workspace
    env_file:
      - .env.openclaw
    environment:
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspace
    entrypoint: ["openclaw"]

volumes:
  openclaw-data:
    driver: local
  openclaw-workspace:
    driver: local
