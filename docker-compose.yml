version: "3.8"

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    volumes:
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/workspace
      - ${OPENCLAW_EXTRA_MOUNTS:-/dev/null:/dev/null:ro}
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "dist/index.js", "health", "--token", "${OPENCLAW_GATEWAY_TOKEN}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  openclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-cli
    profiles:
      - cli
    volumes:
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/workspace
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    entrypoint: ["node", "dist/index.js"]

volumes:
  openclaw-config:
    driver: local
  openclaw-workspace:
    driver: local
