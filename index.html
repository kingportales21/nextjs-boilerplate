<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2.882 km</title>
  <meta name="description" content="Cada segundo que pasa es uno menos sin ti.">

  <!-- Google Fonts: Cormorant Garamond (nórdica, elegante) + Inter (minimalista) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       RESET & BASE
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0a0a0c;
      color: #e8e4df;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       CANVAS DE PARTÍCULAS (fondo estrellado)
       ============================================ */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ============================================
       AURORA BOREAL (gradiente animado sutil)
       ============================================ */
    .aurora {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.15;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(72, 160, 220, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(100, 200, 180, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(130, 100, 200, 0.2) 0%, transparent 50%);
      animation: auroraShift 20s ease-in-out infinite alternate;
      transition: opacity 3s ease;
    }

    /* Cuando faltan < 24h: tonos cálidos (fuego / España) */
    .aurora.warm {
      background:
        radial-gradient(ellipse at 20% 20%, rgba(220, 120, 60, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(200, 80, 80, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(180, 100, 50, 0.2) 0%, transparent 50%);
      opacity: 0.25;
    }

    @keyframes auroraShift {
      0%   { transform: scale(1) translate(0, 0); }
      33%  { transform: scale(1.1) translate(-2%, 1%); }
      66%  { transform: scale(0.95) translate(2%, -1%); }
      100% { transform: scale(1.05) translate(-1%, 2%); }
    }

    /* ============================================
       PANTALLA INTRO
       ============================================ */
    #intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0c;
      transition: opacity 1.5s ease, visibility 1.5s ease;
    }

    #intro-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-line {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.4rem, 5vw, 2rem);
      text-align: center;
      line-height: 1.6;
      padding: 0 1.5rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 2s ease, transform 2s ease;
      letter-spacing: 0.02em;
    }

    .intro-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .intro-line.fade-out {
      opacity: 0;
      transform: translateY(-8px);
    }

    /* ============================================
       PANTALLA PRINCIPAL
       ============================================ */
    #main-screen {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #main-screen.visible {
      opacity: 1;
    }

    /* ============================================
       CUENTA ATRÁS
       ============================================ */
    .countdown-container {
      text-align: center;
      margin-bottom: 2rem;
    }

    .countdown-label {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.1rem);
      color: rgba(232, 228, 223, 0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .countdown-units {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 4vw, 3rem);
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-value {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 12vw, 5.5rem);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #e8e4df;
      min-width: 2ch;
    }

    .countdown-unit-label {
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      color: rgba(232, 228, 223, 0.5);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .countdown-separator {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.5rem, 6vw, 3rem);
      color: rgba(232, 228, 223, 0.2);
      align-self: flex-start;
      margin-top: 0.3rem;
    }

    /* ============================================
       MENSAJES BAJO EL CONTADOR
       ============================================ */
    .sub-message {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.05rem, 3vw, 1.15rem);
      color: rgba(232, 228, 223, 0.6);
      text-align: center;
      margin-top: 0.8rem;
      letter-spacing: 0.01em;
      padding: 0 1rem;
    }

    /* Mensaje de < 7 días */
    .week-message {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(1rem, 2.5vw, 1.05rem);
      color: rgba(232, 228, 223, 0.7);
      text-align: center;
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 2s ease;
      max-width: 500px;
      padding: 0 1rem;
    }

    .week-message.visible {
      opacity: 1;
    }

    /* ============================================
       CORAZÓN CON LATIDO
       ============================================ */
    .heartbeat {
      margin-top: 2rem;
      font-size: 1rem;
      opacity: 0.35;
      animation: heartPulse 2s ease-in-out infinite;
      user-select: none;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1); opacity: 0.35; }
      15%      { transform: scale(1.15); opacity: 0.6; }
      30%      { transform: scale(1); opacity: 0.35; }
      45%      { transform: scale(1.1); opacity: 0.5; }
      60%      { transform: scale(1); opacity: 0.35; }
    }

    /* ============================================
       BOTÓN INTERACTIVO
       ============================================ */
    .action-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      margin-top: 2rem;
    }

    .action-btn {
      padding: 1rem 2rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2.2vw, 0.9rem);
      color: rgba(232, 228, 223, 0.7);
      background: transparent;
      border: 1px solid rgba(232, 228, 223, 0.2);
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.5s ease;
      min-width: 280px;
      width: 90%;
      max-width: 340px;
    }

    .action-btn:hover {
      color: rgba(232, 228, 223, 0.9);
      border-color: rgba(232, 228, 223, 0.35);
      box-shadow: 0 0 30px rgba(232, 228, 223, 0.05);
    }

    .action-btn:active {
      transform: scale(0.97);
    }

    /* ============================================
       OVERLAY
       ============================================ */
    .overlay-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 200;
      background: rgba(8, 8, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .overlay-backdrop.active {
      opacity: 1;
      visibility: visible;
    }

    .overlay-content {
      max-width: 520px;
      width: 90%;
      padding: 3rem 2rem;
      text-align: center;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.8s ease;
    }

    .overlay-backdrop.active .overlay-content {
      transform: scale(1) translateY(0);
    }

    .overlay-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.25rem, 4.5vw, 1.5rem);
      line-height: 2;
      color: rgba(232, 228, 223, 0.95);
      letter-spacing: 0.01em;
    }

    .overlay-close {
      margin-top: 2.5rem;
      padding: 0.9rem 2.5rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      color: rgba(232, 228, 223, 0.55);
      background: transparent;
      border: 1px solid rgba(232, 228, 223, 0.15);
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.4s ease;
    }

    .overlay-close:hover {
      color: rgba(232, 228, 223, 0.7);
      border-color: rgba(232, 228, 223, 0.25);
    }

    /* ============================================
       PANTALLA FINAL (contador en cero)
       ============================================ */
    #final-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 300;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 3s ease, visibility 3s ease;
    }

    #final-screen.active {
      opacity: 1;
      visibility: visible;
    }

    .final-main {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(2.5rem, 10vw, 5rem);
      color: #0a0a0c;
      letter-spacing: -0.02em;
    }

    .final-sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #0a0a0c;
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 2s ease 1.5s;
    }

    #final-screen.active .final-sub {
      opacity: 1;
    }

    /* ============================================
       RESPONSIVE AJUSTES FINOS
       ============================================ */
    @media (max-width: 480px) {
      #main-screen {
        padding: 1.5rem 1rem;
        justify-content: center;
      }

      .countdown-container {
        margin-bottom: 1.2rem;
      }

      .countdown-units {
        gap: 0.5rem;
      }

      .countdown-value {
        font-size: 2.8rem;
      }

      .countdown-unit-label {
        font-size: 0.6rem;
      }

      .countdown-separator {
        font-size: 1.2rem;
        margin-top: 0.4rem;
      }

      .countdown-label {
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }

      .sub-message {
        font-size: 1rem;
      }

      .action-buttons {
        margin-top: 1.2rem;
        gap: 0.6rem;
        width: 100%;
        align-items: center;
      }

      .action-btn {
        font-size: 0.82rem;
        padding: 0.9rem 1.5rem;
        width: 95%;
        min-width: unset;
      }

      .heartbeat {
        margin-top: 1rem;
      }

      .overlay-backdrop {
        align-items: flex-start;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .overlay-content {
        padding: 2rem 1.5rem;
        margin: 2rem 0;
      }

      .overlay-text {
        font-size: 1.2rem;
        line-height: 1.9;
      }

      .overlay-close {
        font-size: 0.8rem;
        padding: 0.85rem 2rem;
      }
    }

    /* Pantallas muy pequeñas (iPhone SE, etc) */
    @media (max-width: 375px) {
      .countdown-value {
        font-size: 2.4rem;
      }

      .action-btn {
        font-size: 0.78rem;
        padding: 0.85rem 1.2rem;
      }
    }

    @media (max-height: 600px) {
      .heartbeat {
        margin-top: 0.8rem;
      }
      .countdown-container {
        margin-bottom: 0.8rem;
      }
      .action-buttons {
        margin-top: 1rem;
        gap: 0.5rem;
      }
    }

    /* Pantallas muy altas (tablets en vertical) */
    @media (min-height: 800px) and (max-width: 480px) {
      .countdown-value {
        font-size: 3.2rem;
      }
      .action-btn {
        font-size: 0.9rem;
        padding: 1.1rem 2rem;
      }
      .sub-message {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Canvas para partículas / estrellas -->
  <canvas id="particles-canvas"></canvas>

  <!-- Aurora boreal animada -->
  <div class="aurora" id="aurora"></div>

  <!-- ============================================
       PANTALLA INTRO
       ============================================ -->
  <div id="intro-screen">
    <p class="intro-line" id="intro-line-1">Cada vez falta menos para ver a la mujer de mi vida,</p>
    <p class="intro-line" id="intro-line-2" style="margin-top: 1rem;">a mi futura esposa.</p>
  </div>

  <!-- ============================================
       PANTALLA PRINCIPAL
       ============================================ -->
  <div id="main-screen">
    <div class="countdown-container">
      <div class="countdown-label">Nos volvemos a ver en</div>

      <div class="countdown-units">
        <div class="countdown-unit">
          <span class="countdown-value" id="days">--</span>
          <span class="countdown-unit-label">Días</span>
        </div>
        <span class="countdown-separator">:</span>
        <div class="countdown-unit">
          <span class="countdown-value" id="hours">--</span>
          <span class="countdown-unit-label">Horas</span>
        </div>
        <span class="countdown-separator">:</span>
        <div class="countdown-unit">
          <span class="countdown-value" id="minutes">--</span>
          <span class="countdown-unit-label">Minutos</span>
        </div>
        <span class="countdown-separator">:</span>
        <div class="countdown-unit">
          <span class="countdown-value" id="seconds">--</span>
          <span class="countdown-unit-label">Segundos</span>
        </div>
      </div>

      <p class="sub-message">Cada segundo que pasa es uno menos sin ti.</p>

      <div class="week-message" id="week-message">
        La próxima vez que nos abracemos… ya no será un sueño.
      </div>
    </div>

    <!-- Corazón con latido -->
    <div class="heartbeat" aria-hidden="true">&#10084;</div>

    <!-- Botones interactivos -->
    <div class="action-buttons">
      <button class="action-btn" data-overlay="miss">Ábrela cuando me eches de menos</button>
      <button class="action-btn" data-overlay="bad-day">Ábrela cuando tengas un mal día</button>
      <button class="action-btn" data-overlay="doubt">Ábrela cuando dudes</button>
    </div>
  </div>

  <!-- ============================================
       OVERLAY CON MENSAJE ROMÁNTICO
       ============================================ -->
  <div class="overlay-backdrop" id="overlay">
    <div class="overlay-content">
      <p class="overlay-text" id="overlay-text"></p>
      <button class="overlay-close" id="close-overlay">Cerrar</button>
    </div>
  </div>

  <!-- ============================================
       PANTALLA FINAL
       ============================================ -->
  <div id="final-screen">
    <p class="final-main">Corre.</p>
    <p class="final-sub">Ya estoy ahí. &#10084;&#65039;</p>
  </div>

  <script>
    /* ============================================
       CORAZÓN DE PARTÍCULAS INTERACTIVO
       ============================================ */
    (function initHeartParticles() {
      var canvas = document.getElementById('particles-canvas');
      var ctx = canvas.getContext('2d');
      var width, height;
      var particles = [];
      var animationId;
      var mouse = { x: -1000, y: -1000 };
      var isMobile = window.innerWidth <= 600;
      var PARTICLE_COUNT = isMobile ? 300 : 700;
      var TRAIL_OPACITY = 0.08;
      var time = 0;

      // Fórmula paramétrica del corazón
      function heartX(t) {
        return 16 * Math.pow(Math.sin(t), 3);
      }
      function heartY(t) {
        return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      }

      // Colores rosa/rojo/púrpura
      var colors = ['#f472b6', '#fb7185', '#e879f9', '#a78bfa', '#f9a8d4', '#c084fc', '#fb923c'];

      function Particle() {
        this.init(true);
      }

      Particle.prototype.init = function(firstTime) {
        // Ángulo aleatorio en el corazón
        this.t = Math.random() * Math.PI * 2;
        // Escala del corazón adaptada a pantalla
        var scale = Math.min(width, height) * (isMobile ? 0.022 : 0.025);
        // Posición objetivo en el corazón
        this.targetX = width / 2 + heartX(this.t) * scale;
        this.targetY = height / 2 + heartY(this.t) * scale - (isMobile ? 20 : 40);

        if (firstTime) {
          // Posición inicial aleatoria (aparecen desde fuera)
          var angle = Math.random() * Math.PI * 2;
          var dist = Math.max(width, height) * 0.6;
          this.x = width / 2 + Math.cos(angle) * dist;
          this.y = height / 2 + Math.sin(angle) * dist;
        }

        this.age = 0;
        this.life = Math.random() * 400 + 200;
        // Variación sutil para que no sea rígido
        this.offset = (Math.random() - 0.5) * scale * 0.6;
        this.offsetY = (Math.random() - 0.5) * scale * 0.6;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.size = Math.random() * 1.5 + 0.8;
        this.speed = Math.random() * 0.02 + 0.015;
        this.floatPhase = Math.random() * Math.PI * 2;
        this.floatSpeed = Math.random() * 0.01 + 0.005;
        this.floatRadius = Math.random() * 3 + 1;
      };

      Particle.prototype.update = function() {
        // Floating suave
        this.floatPhase += this.floatSpeed;
        var floatX = Math.cos(this.floatPhase) * this.floatRadius;
        var floatY = Math.sin(this.floatPhase * 0.7) * this.floatRadius;

        // Pulso del corazón (latido)
        var beat = 1 + Math.sin(time * 0.03) * 0.03;
        var scale = Math.min(width, height) * (isMobile ? 0.022 : 0.025);
        var tx = width / 2 + heartX(this.t) * scale * beat + this.offset + floatX;
        var ty = height / 2 + heartY(this.t) * scale * beat - (isMobile ? 20 : 40) + this.offsetY + floatY;

        // Repulsión del mouse/dedo
        var mdx = mouse.x - this.x;
        var mdy = mouse.y - this.y;
        var mDist = Math.sqrt(mdx * mdx + mdy * mdy);
        var repelRadius = isMobile ? 80 : 120;
        var repelX = 0, repelY = 0;

        if (mDist < repelRadius && mDist > 0) {
          var force = (repelRadius - mDist) / repelRadius;
          repelX = -(mdx / mDist) * force * 60;
          repelY = -(mdy / mDist) * force * 60;
        }

        // Mover hacia objetivo con easing
        this.x += (tx + repelX - this.x) * this.speed;
        this.y += (ty + repelY - this.y) * this.speed;

        this.age++;
        if (this.age > this.life) {
          this.init(false);
        }
      };

      Particle.prototype.draw = function(context) {
        var alpha;
        if (this.age < 60) {
          alpha = this.age / 60;
        } else if (this.age > this.life - 60) {
          alpha = (this.life - this.age) / 60;
        } else {
          alpha = 0.7 + Math.sin(this.floatPhase) * 0.3;
        }
        context.globalAlpha = Math.max(0, Math.min(1, alpha));
        context.fillStyle = this.color;
        context.beginPath();
        context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        context.fill();
      };

      function init() {
        var dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;
        isMobile = width <= 600;
        PARTICLE_COUNT = isMobile ? 300 : 700;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        particles = [];
        for (var i = 0; i < PARTICLE_COUNT; i++) {
          particles.push(new Particle());
        }
      }

      function animate() {
        time++;
        ctx.fillStyle = 'rgba(10, 10, 12, ' + TRAIL_OPACITY + ')';
        ctx.fillRect(0, 0, width, height);

        for (var i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw(ctx);
        }
        ctx.globalAlpha = 1;
        animationId = requestAnimationFrame(animate);
      }

      window.addEventListener('resize', function() {
        init();
      });

      document.addEventListener('mousemove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      document.addEventListener('mouseleave', function() {
        mouse.x = -1000;
        mouse.y = -1000;
      });

      document.addEventListener('touchmove', function(e) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      });

      document.addEventListener('touchend', function() {
        mouse.x = -1000;
        mouse.y = -1000;
      });

      init();
      animate();
    })();

    /* ============================================
       SECUENCIA DE INTRO
       ============================================ */
    (function introSequence() {
      var line1 = document.getElementById('intro-line-1');
      var line2 = document.getElementById('intro-line-2');
      var introScreen = document.getElementById('intro-screen');
      var mainScreen = document.getElementById('main-screen');

      // Línea 1: aparece tras 0.8s
      setTimeout(function() {
        line1.classList.add('visible');
      }, 800);

      // Línea 2: aparece tras 3.5s (0.8 + fade + pausa de 2s)
      setTimeout(function() {
        line2.classList.add('visible');
      }, 3500);

      // Ambas líneas hacen fade-out tras 7s
      setTimeout(function() {

    (function countdown() {
      var targetDate = new Date('2026-03-19T00:00:00');
      var daysEl = document.getElementById('days');
      var hoursEl = document.getElementById('hours');
      var minutesEl = document.getElementById('minutes');
      var secondsEl = document.getElementById('seconds');
      var weekMessage = document.getElementById('week-message');
      var aurora = document.getElementById('aurora');
      var finalScreen = document.getElementById('final-screen');
      var finalShown = false;

      function pad(n) {
        return n < 10 ? '0' + n : String(n);
      }

      function update() {
        var now = new Date();
        var diff = targetDate.getTime() - now.getTime();

        // Contador llegó a cero
        if (diff <= 0) {
          daysEl.textContent = '00';
          hoursEl.textContent = '00';
          minutesEl.textContent = '00';
          secondsEl.textContent = '00';

          if (!finalShown) {
            finalShown = true;
            finalScreen.classList.add('active');
          }
          return;
        }

        var totalSeconds = Math.floor(diff / 1000);
        var d = Math.floor(totalSeconds / 86400);
        var h = Math.floor((totalSeconds % 86400) / 3600);
        var m = Math.floor((totalSeconds % 3600) / 60);
        var s = totalSeconds % 60;

        daysEl.textContent = pad(d);
        hoursEl.textContent = pad(h);
        minutesEl.textContent = pad(m);
        secondsEl.textContent = pad(s);

        // Menos de 7 días: mostrar mensaje especial
        var sevenDays = 7 * 24 * 60 * 60 * 1000;
        if (diff < sevenDays) {
          weekMessage.classList.add('visible');
        }

        // Menos de 24 horas: aurora cálida
        var oneDay = 24 * 60 * 60 * 1000;
        if (diff < oneDay) {
          aurora.classList.add('warm');
        }
      }

      update();
      setInterval(update, 1000);
    })();

      // Selecciona un mensaje diferente cada día basado en el día del año
      function getDayOfYear() {
        var now = new Date();
        var start = new Date(now.getFullYear(), 0, 0);
        var diff = now - start;
        return Math.floor(diff / 86400000);
      }

          var key = btn.getAttribute('data-overlay');
          var pool = messages[key];
          var index = dayOfYear % pool.length;
          overlayText.innerHTML = pool[index];
          backdrop.classList.add('active');
        });
      });

      closeBtn.addEventListener('click', function() {
        backdrop.classList.remove('active');
      });

        if (e.target === backdrop) {
          backdrop.classList.remove('active');
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && backdrop.classList.contains('active')) {
          backdrop.classList.remove('active');
        }
      });
